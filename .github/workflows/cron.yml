name: News Bot Cron

on:
  schedule:
    - cron: '0 * * * *' # Gira ogni ora
  workflow_dispatch: # Permette l'invio manuale

jobs:
  build:
    runs-on: ubuntu-latest
    # IMPORTANTE: Permessi per scrivere nel repository
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/close-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install feedparser requests beautifulsoup4 google-genai

      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
        run: python bot.py

      - name: Commit e Push del polmone
        run: |
          git config --global user.name "Bot Polmone"
          git config --global user.email "bot@wrestlingnews.com"
          git add history.txt
          # Il comando commit non deve fallire se non ci sono nuove news
          git commit -m "Aggiornamento polmone news [skip ci]" || echo "Nessuna modifica da salvare"
          git push
