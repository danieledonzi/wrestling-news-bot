name: News Bot Cron

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: news-bot
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser requests beautifulsoup4 google-genai

      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
        run: python bot.py

      - name: Save history
        run: |
          git config --global user.name "News Bot"
          git config --global user.email "bot@wrestlingnews.com"

          git add history.txt

          git pull origin main --rebase --autostash || true

          if ! git diff --cached --quiet; then
            git commit -m "Update history [skip ci]"
            git push origin main
          else
            echo "Nessuna modifica da salvare"
          fi
