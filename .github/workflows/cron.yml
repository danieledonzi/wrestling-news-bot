name: News Bot Cron

on:
  schedule:
    - cron: '0 * * * *' # Gira ogni ora
  workflow_dispatch: # Permette l'invio manuale

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install feedparser requests beautifulsoup4 google-genai

      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
        run: python bot.py

      - name: Commit e Push del polmone
        run: |
          git config --global user.name "Bot Polmone"
          git config --global user.email "bot@wrestlingnews.com"
          # 1. Aggiungiamo i file prima di fare il pull
          git add history.txt
          # 2. Scarichiamo gli aggiornamenti con rebase (autostash mette al sicuro history.txt)
          git pull origin main --rebase --autostash
          # 3. Facciamo il commit (solo se ci sono modifiche effettive)
          git commit -m "Aggiornamento polmone news [skip ci]" || echo "Nessuna modifica da salvare"
          # 4. Push finale
          git push origin main
